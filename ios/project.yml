name: Copare
options:
  bundleIdPrefix: com.copare
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Copare:
    type: application
    platform: iOS
    sources:
      - path: Copare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.copare.app
        INFOPLIST_FILE: Copare/Info.plist
        CODE_SIGN_ENTITLEMENTS: Copare/Copare.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    entitlements:
      path: Copare/Copare.entitlements
    capabilities:
      Push Notifications: true
    info:
      path: Copare/Info.plist
      properties:
        CFBundleDisplayName: Copare
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NEON_AUTH_BASE_URL: $(NEON_AUTH_BASE_URL)
        API_BASE_URL: $(API_BASE_URL)
        WS_BASE_URL: $(WS_BASE_URL)
        AUTH_ORIGIN: $(AUTH_ORIGIN)

schemes:
  Copare:
    build:
      targets:
        Copare: all
    run:
      config: Debug
